<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OUCSS Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #daf3ff;
      text-align: center;
      padding: 20px;
      background: #0f172a;
      overflow: hidden;
    }

    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
      opacity: 0.6;
      background: radial-gradient(circle at top, #0f172a 0%, #02040a 60%, #010208 100%);
    }

    .leaderboard-wrapper {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
      border: 1px solid rgba(0,255,204,0.2);
      border-radius: 14px;
      background: rgba(1, 19, 30, 0.7);
      backdrop-filter: blur(6px);
    }

    .leaderboard-title {
      margin-top: 0;
      color: #8fefb2;
      text-shadow: 0 0 16px rgba(0,255,204,0.7);
    }

    h1 {
      margin-bottom: 10px;
    }

    .back-btn {
      margin-bottom: 20px;
      padding: 10px 20px;
      background: #334155;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .back-btn:hover {
      background: #475569;
    }

    table {
      width: 80%;
      margin: auto;
      border-collapse: collapse;
      background: #1e293b;
    }

    th, td {
      padding: 12px;
    }

    th {
      background: #334155;
    }

    tr:nth-child(even) {
      background: #0f172a;
    }

    tr:nth-child(odd) {
      background: #1e293b;
    }
  </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<div class="leaderboard-wrapper">
  <h1 class="leaderboard-title">🏆 OUCSS CTF Leaderboard</h1>
  <button onclick="goBack()" class="back-btn">⬅ Back</button>

  <table id="leaderboard">
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Score</th>
    </tr>
  </thead>
  <tbody id="leaderboardBody"></tbody>
</table>
</div>

<script src="/assets/js/theme.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const API_URL = "https://ctf.oucss.rocks/api/v1/scoreboard";

// Matrix background effect
(function() {
  const canvas = document.getElementById('matrixCanvas');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  let width = window.innerWidth;
  let height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;

  const cols = Math.floor(width / 16) + 1;
  const drops = Array(cols).fill(0);

  function draw() {
    ctx.fillStyle = 'rgba(0, 5, 10, 0.15)';
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = '#0ff';
    ctx.font = '15px monospace';

    const techChars = '01<>+-*/=%#&@^$!?~[]{}()|';
    for (let i = 0; i < drops.length; i++) {
      const text = techChars.charAt(Math.floor(Math.random() * techChars.length));
      ctx.fillText(text, i * 16, drops[i] * 18);

      if (drops[i] * 18 > height || Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }

  window.addEventListener('resize', resize);
  setInterval(draw, 60);
})();

let lastScores = {};
let firstLoad = true;

// 🔙 smart back button
function goBack() {
  if (document.referrer) {
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
}

async function loadLeaderboard() {
  const tbody = document.querySelector("#leaderboardBody");
  if (!tbody) return;

  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error(`API returned ${response.status}`);
    const result = await response.json();

    tbody.innerHTML = "";

    if (Array.isArray(result.data) && result.data.length > 0) {
      result.data.forEach((team, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${team.name}</td>
          <td>${team.score}</td>
        `;
        tbody.appendChild(row);
      });

      // After remote data, merge local entries too
      const localEntries = getLocalLeaderboard();
      if (localEntries.length > 0) {
        const localSorted = localEntries.slice().sort((a, b) => b.score - a.score);
        localSorted.forEach((entry) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>–</td>
            <td>${entry.username} (local)</td>
            <td>${entry.score}</td>
          `;
          tbody.appendChild(row);
        });
      }

      return;
    }

    // fallback to local if API returns no data
    renderLeaderboard();
  } catch (error) {
    console.error("Error loading scoreboard, falling back to local:", error);
    renderLeaderboard();
  }
}

// 🎉 popup alert
function showSolveAlert(teamName, points) {
  const alertBox = document.createElement("div");

  alertBox.innerHTML = `🎉 ${teamName} solved a challenge (+${points})`;

  const existing = document.querySelectorAll(".solve-alert").length;

  alertBox.classList.add("solve-alert");
  alertBox.style.position = "fixed";
  alertBox.style.bottom = (20 + existing * 70) + "px";
  alertBox.style.right = "20px";
  alertBox.style.background = "#22c55e";
  alertBox.style.color = "white";
  alertBox.style.padding = "15px 20px";
  alertBox.style.borderRadius = "10px";
  alertBox.style.boxShadow = "0 0 10px rgba(0,0,0,0.3)";
  alertBox.style.zIndex = "9999";

  document.body.appendChild(alertBox);

  setTimeout(() => {
    alertBox.remove();
  }, 4000);
}

// run
loadLeaderboard();
setInterval(loadLeaderboard, 10000);
</script>

</body>
</html>
