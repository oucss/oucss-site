<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OUCSS CTF Leaderboard - See how you rank against other members.">
  <meta property="og:title" content="Leaderboard | OUCSS">
  <meta property="og:type" content="website">
  <title>Leaderboard | OUCSS</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>

<header class="navbar">
  <div class="nav-container">
    <div class="logo"><a href="/">OUCSS</a></div>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="lore.html">Lore</a>
      <a href="team.html">Team</a>
      <a href="projects.html">Member Projects</a>
      <a href="blog.html">Blogs</a>
      <a href="meetups.html">Meetups</a>
      <a href="resources.html">Resources</a>
      <a href="challenge.html">Challenge</a>
      <a href="https://join.oucss.rocks" target="_blank">Join</a>
    </nav>
    <div class="nav-controls">
      <button id="themeToggle">🌙</button>
      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>CTF Leaderboard</h1>
    <p>See how you rank against other OUCSS members.</p>
  </div>
  <div class="hero-grid"></div>
</section>

<section class="leaderboard-section">
  <div class="leaderboard-container">
    <div class="terminal-window">
      <div class="terminal-header">
        <span class="terminal-title">system_admin@oucss:~/leaderboard</span>
      </div>
      <table id="leaderboardTable" class="terminal-table">
        <thead>
          <tr>
            <th>RANK</th>
            <th>USER</th>
            <th>SCORE</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr>
            <td colspan="3" class="loading">Initializing connection...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>

<script src="/assets/js/theme.js"></script>
<script src="/assets/js/main.js"></script>
</body>
</html>
